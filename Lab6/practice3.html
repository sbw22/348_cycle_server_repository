<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <script src="javascript3.js"></script>
</head>
<body>
    <h1>Practice Page 3 -- Javascript Password Verification</h1>
    <h4>In this practice, the user will allow the user to type in a password in two seperate input boxes. If the two passwords don't match, then we will tell the user the passwords don't match. If they do match, we will tell the user the passwords match.</h4>
    <!-- Put the two password input boxes here -->
    <label for="password1">Password:</label>
    <input type="password" id="password1" name="password1"><br><br>
    <label for="password2">Confirm Password:</label>
    <input type="password" id="password2" name="password2"><br><br>
    <button onclick="verifyPassword()">Verify Password</button>
    <p id="message"></p>
</body>
</html>
